server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Прокси API запросов на бэкенд
  location /v1/ {
    proxy_pass https://dev.api.yobble.org/v1/;
    proxy_set_header Host dev.api.yobble.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Type "web";

    # Для работы с куками — пробрасываем все куки
    proxy_pass_request_headers on;
    proxy_set_header Cookie $http_cookie;
  }

  # Прокси WebSocket соединений
  location /socket.io/ {
    proxy_pass https://dev.api.yobble.org/socket.io/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";
    proxy_set_header Host dev.api.yobble.org;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Client-Type "web";
    
    # CORS для сокетов
    add_header Access-Control-Allow-Origin "https://dev.app.yobble.org" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
    
    if ($request_method = 'OPTIONS') {
      add_header Access-Control-Allow-Origin "https://dev.app.yobble.org";
      add_header Access-Control-Allow-Credentials "true";
      add_header Access-Control-Max-Age 3600;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }
  }

  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, immutable";
    try_files $uri =404;
  }
}
