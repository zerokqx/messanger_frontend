version: "3.9"

services:
  yobble-messenger-frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: yobble_messenger_frontend_dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/bun_modules
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "100"
    networks:
      - frp-net
    command: sh -c "bun install && bun run dev"
    restart: unless-stopped

networks:
  frp-net:
    external: true
