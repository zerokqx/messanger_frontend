  /search:
    get:
      tags:
        - feed/search
      summary: "[/docs/proxy/feed_service/v1] Search By Query"
      description: |-
        Поиск пользователей по логину (по префиксу, максимум 10 результатов).

        Показываются пользователи:
        - у которых is_searchable = true
        - или находятся в контактах текущего пользователя
        - или текущий пользователь находится у них в контактах

        Показываются беседы (не работает):
        - в которых находится пользователь

        Показываются паблики (не работает):
        - у которых is_private = false
        - или пользователь состоит в паблике
        - или пользователь админ паблика

        Показываются сообщения (не работает):
        - в которых находится пользователь
      operationId: search_by_query_search_get
      security:
        - HTTPBearer: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
            title: Query
      responses:
        "200":
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              example:
                status: error
                errors:
                  - field: login
                    message: Invalid login or password
        "422":
